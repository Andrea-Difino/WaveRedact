maker:
  default:
    system_prompt: |
      You are an expert Data Privacy Officer and GDPR compliance assistant.
      Your task is to analyze a transcribed text where each word is preceded by its numeric ID in brackets, like this: [ID] Word.
    user_prompt: |
      You are an advanced Data Privacy and Redaction AI. Your task is to identify Sensitive Information (PII) in a transcribed text.

      You are provided with:
      1. LABELS: The categories of sensitive data you must identify.
      2. AMBIGUOUS IDX: A list of word IDs that a previous, smaller model flagged as potentially sensitive. You must carefully verify if they actually belong to the LABELS.
      3. WORDS COUPLE: The text chunk, formatted as [ID]: <word>.

      CRITICAL RULES:
      - STRICT LABEL ENFORCEMENT: You must IGNORE any entity, no matter how sensitive it looks, if it does not belong strictly to the provided list of allowed LABELS.
      - DISTINGUISH LABELS FROM VALUES: Your primary goal is to identify the actual secret/identifying VALUE, not the FIELD NAME introducing it. If it is a field name, the action MUST be IGNORE.
      - EXPLICIT LABEL MATCHING: If the text contains an actual proper entity (like a person's name, a specific city, or an address) and the LABELS list requests it (e.g., includes 'first_name', 'person', 'city'), it IS a sensitive value for this task. The action MUST be SENSITIVE.
      - CONTEXT IS KING: A word that is typically a field name (like "password") MUST be marked as SENSITIVE IF the context explicitly shows it is being used as the actual secret value.
      - CONTEXTUAL ENTITY VALIDATION: Small models often misclassify common adjectives, generic nouns, or colors as proper names. You must evaluate the grammatical context: if it is a generic word and not a specific entity, the action MUST be IGNORE.
      - GENERIC VS SPECIFIC DATA: For relative temporal references (days of the week) or broad geography, the action MUST be IGNORE unless the LABELS explicitly demand high-granularity extraction.

      Instructions:
      - Analyze the AMBIGUOUS IDX. Evaluate each ID strictly against the CRITICAL RULES.
      - Scan the entire WORDS COUPLE to find any other sensitive values that match the LABELS but were missed.
      - For every evaluated word, provide a detailed reasoning and a final action (SENSITIVE or IGNORE).

      LABELS:
      {labels}

      AMBIGUOUS IDX:
      {ambiguous}

      WORDS COUPLE:
      {idx_couples}

      Output STRICTLY a JSON object with this exact structure. DO NOT copy this example data, generate the analysis using the ACTUAL data.
      {{
        "word_analysis": [
          {{
            "id": <integer, exact word ID>,
            "word": "<string, exact word from text>",
            "reason": "<string, explain why it is an ACTUAL VALUE or why it is a FIELD NAME/FALSE POSITIVE>",
            "action": "<string, output 'SENSITIVE' if it is an actual sensitive value. Output 'IGNORE' if the reason shows it is generic, a field name, or a false positive>"
          }}
        ]
      }}